<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .contenedor {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #171c49;
        }

        p {
            font-size: 18px;
            margin: 20px 0;
        }

        /* BOTÓN WHATSAPP */
        .btn-whatsapp {
            display: inline-block;
            padding: 15px 25px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            margin: 10px;
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            background: #1ebe5d;
        }

        /* EMAIL */
        .email {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: #171c49;
            text-decoration: none;
        }

        .email:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>Contáctame</h1>

        <p>¿Tienes un proyecto en mente? Nos encantaría conocerlo.</p>

        <!-- BOTÓN WHATSAPP -->
        <a href="https://wa.me/51987654321" target="_blank" class="btn-whatsapp">
            💬 Escríbeme por WhatsApp
        </a>

        <!-- EMAIL -->
        <a href="mailto:tucorreo@gmail.com" class="email">
            📧 Enviar correo: alexandervaler23@gmail.com
        </a>
    </div>

</body>
</html>
